<!DOCTYPE html>
<html>
<head>
  <title>Carta Interativa</title>

  <style>
    body {
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      font-family: Arial;
      color: white;
      text-align: center;
      padding-top: 40px;
      overflow-x: hidden;
      transition: 1s ease;
    }

    h1 { font-size: 34px; }

    .scene {
      perspective: 1000px;
      margin-top: 40px;
    }

    .envelope {
      width: 220px;
      height: 140px;
      margin: auto;
      position: relative;
      transform-style: preserve-3d;
      cursor: pointer;
      transition: 1s ease;
    }

    .front, .back, .flap {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #00c6ff;
      border-radius: 8px;
    }

    .back { transform: translateZ(-2px); background: #009fd6; }

    .flap {
      clip-path: polygon(0 0, 50% 50%, 100% 0);
      transform-origin: top;
      transition: 0.8s ease;
      background: #00aee0;
    }

    .open .flap { transform: rotateX(180deg); }

    .letter {
      width: 80%;
      max-width: 520px;
      margin: 30px auto;
      background: white;
      color: black;
      padding: 20px;
      border-radius: 10px;
      text-align: left;
      transform: translateY(80px);
      opacity: 0;
      transition: 1s ease;
    }

    .letter.show {
      transform: translateY(-20px);
      opacity: 1;
    }

    .signature {
      margin-top: 20px;
      opacity: 0;
      font-weight: bold;
      text-align: right;
    }

    .signature.show {
      animation: appear 1s forwards;
    }

    @keyframes appear {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    .time-button {
      margin-top: 25px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: white;
      color: black;
      cursor: pointer;
    }

    .temporal {
      background: linear-gradient(to right, #2b1055, #7597de) !important;
    }

    #calendar {
      margin-top: 30px;
      display: none;
    }

    .date {
      background: rgba(255,255,255,0.15);
      margin: 8px auto;
      padding: 10px;
      border-radius: 10px;
      width: 85%;
      cursor: pointer;
      transition: 0.3s;
    }

    .date:hover {
      transform: scale(1.03);
      background: rgba(255,255,255,0.3);
    }

    #memory {
      margin-top: 20px;
      width: 85%;
      max-width: 650px;
      margin-left: auto;
      margin-right: auto;
      background: white;
      color: black;
      padding: 20px;
      border-radius: 12px;
      text-align: left;
      display: none;
      animation: aparecer 0.5s ease;
    }

    @keyframes aparecer {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }
    
    .btn-roxo {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #7b2cbf;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.btn-roxo:hover {
  background: #9d4edd;
  transform: scale(1.05);
}
  </style>
</head>

<body>

<h1>📩 Carta Interativa</h1>
<p>Clique para abrir</p>

<audio id="musica" src="musica.mp3"></audio>

<div class="scene">
  <div class="envelope" id="envelope" onclick="abrir()">
    <div class="front"></div>
    <div class="back"></div>
    <div class="flap"></div>
  </div>
</div>

<div class="letter" id="letter">
  <div id="text"></div>
  
  <div class="signature" id="signature">— Nicholas</div>

  <button class="btn-roxo" id="btnVoltaTempo" onclick="acaoEspecial()" style="display:none;">
    ⏳ Aperte quando voltar da viagem no tempo!
  </button>

</div>

<button class="time-button" onclick="maquinaDoTempo()">🕰️ Máquina do tempo</button>

<div id="calendar"></div>
<div id="memory"></div>

<script>

const texto = `Meu amor, Sabrina,

Olha, queria escrever sobre tudo o que vivemos juntos, sem tirar nada, nem os dias bons nem os ruins.

Quando olho pra trás, vejo o quanto você foi importante pra mim desde o começo. Desde as nossas conversas simples, os jogos, as descobertas, até o dia em que tudo começou de verdade pra mim em 2023. Eu lembro da felicidade que eu senti, de como você foi virando uma das partes mais importantes da minha vida sem eu nem perceber.

Lembra de todos aqueles momentos incríveis que a gente viveu? O reencontro em 2024, os pequenos gestos, as conversas, os beijos, as risadas sem motivo, e até os dias simples que pareciam perfeitos só porque você estava ali? Eu guardei tudo isso com muito carinho.

Mas também teve momentos que eu não soube lidar muito bem com o que estava rolando. Teve dias em que eu errei a mão na interpretação das coisas, que eu acabei me deixando levar pela minha cabeça, pelo meu ego e pelas minhas inseguranças..

E eu sei que isso pode ter te machucado ou te cansado em algum momento.

Não tô te escrevendo isso pra te pressionar ou tentar te puxar de volta pra algo, tá? Só queria ser honesto sobre o que você significou e ainda significa pra mim.

Mas quero que saiba que você foi real comigo em todos esses momentos, e isso não se apaga.

Independentemente do que a gente é agora, eu só queria que você soubesse disso com sinceridade.
`;

const playlist = ["musica.mp3", // Dói sem tanto
  "musica2.mp3", // The Truth Untold
];

let musicaAtual = 0;
  
function somPapel(){
  const ctx=new (window.AudioContext||window.webkitAudioContext)();
  const o=ctx.createOscillator();
  const g=ctx.createGain();
  o.type="triangle";
  o.frequency.value=180;
  g.gain.value=0.05;
  o.connect(g);
  g.connect(ctx.destination);
  o.start();
  o.stop(ctx.currentTime+0.2);
}

function typeWriter(t, i = 0){
  if(i < t.length){
    document.getElementById("text").innerHTML += t[i];
    setTimeout(()=>typeWriter(t, i + 1), 15);
  } else {
    document.getElementById("signature").classList.add("show");

    // 👇 AQUI entra o botão
    document.getElementById("btnVoltaTempo").style.display = "block";
  }
}

function abrir(){
  const env = document.getElementById("envelope");
  const letter = document.getElementById("letter");
  const musica = document.getElementById("musica");

  env.classList.add("open");
  somPapel();

  musica.src = playlist[musicaAtual];
  musica.play();

  musica.onended = function(){
    musicaAtual++;

    if(musicaAtual < playlist.length){
      musica.src = playlist[musicaAtual];
      musica.play();
    }
  };

  setTimeout(()=>{
    letter.classList.add("show");
    typeWriter(texto);
  },700);
}

function acaoEspecial(){

  // evita duplicar
  if(document.getElementById("caixaFinal")) return;

  const caixa = document.createElement("div");
  caixa.id = "caixaFinal";

  caixa.innerHTML = `
  <h2>💜 Eu quero você pra sempre, você e eu todos os dias!</h2>

  <p>
    Eu venho pensando muito em tudo que a gente viveu... e, mais do que isso, em como as coisas mudaram. Não de um jeito brusco, mas aos poucos, quase sem a gente perceber. E talvez seja justamente isso que mais pesa. Eu não quero te pressionar, nem te colocar em uma posição onde você se sinta obrigada a sentir algo por mim. Sentimento não funciona assim, eu sei. Não dá pra forçar, não dá pra pedir, não dá pra negociar. E eu respeito isso, de verdade. Mas ao mesmo tempo, eu não consigo fingir que não sinto falta. Falta do jeito que a gente era, das conversas leves, dos momentos simples que pareciam tão naturais. Falta de quando tudo entre a gente parecia mais... vivo. Eu não tô aqui tentando te convencer de nada. Só queria que você soubesse que, mesmo entendendo que as coisas mudam, uma parte de mim ainda guarda com carinho o que a gente tinha. E, sendo sincero, ainda desejaria que aquilo pudesse existir de novo, nem que fosse aos poucos, no tempo certo. Se não for possível, tudo bem. Eu deveria ter tentado mais. Mas seria mentira dizer que eu não gostaria de tentar. E talvez o que mais me confunde é não saber exatamente onde a gente se perdeu. Se foi em um detalhe pequeno que virou distância, ou se foram várias coisas silenciosas se acumulando. Às vezes parece que ainda tá tudo ali, só coberto por algo que a gente não conseguiu resolver. Eu também não quero apagar o que você sente agora, nem diminuir o que mudou dentro de você. Cada pessoa tem seu tempo, suas próprias respostas... e eu sei que nem sempre elas coincidem. Só que, mesmo entendendo isso, ainda existe em mim aquela vontade de olhar pra gente e pensar “isso ainda pode dar certo”. Não precisa ser como antes de uma vez só. Não precisa voltar correndo pro que a gente era. Mas talvez... só talvez... se ainda existir alguma dúvida aí dentro, alguma lembrança que ainda faça sentido, a gente poderia tentar se reencontrar devagar. Sem pressão, sem cobrança. Só sendo a gente, como já foi um dia. As ligações, as risadas, os filmes, as conversas, eu não sei em que momento tudo se esfriou... Mas eu gostaria que a gente tentasse passar por essa fase, juntos. E se isso não fizer sentido pra você, eu vou ter que tentar entender. Porque gostar de alguém também é saber quando não insistir além do que o outro pode oferecer. Só que eu não queria ficar em silêncio sem pelo menos te mostrar que, aqui dentro, ainda existe verdade, ainda existe cuidado... e ainda existe você em meus pensamentos, em meu coração e também na minha vida. Eu te amo muito Sabrina, de verdade...
  </p>

  <button class="btn-roxo" onclick="abrirFormulario()">
    📝 Responder enquete
  </button>

  <br><br>

  <button onclick="this.parentElement.remove()" class="btn-roxo">
    Fechar
  </button>
`;
  function fecharCaixa(){
  const caixa = document.getElementById("caixaFinal");
  if(caixa) caixa.remove();
  }
  function fecharCaixa(){
  const caixa = document.getElementById("caixaFinal");
  if(caixa) caixa.remove();
  }
  
function maquinaDoTempo(){

  document.body.classList.add("temporal");

  document.getElementById("envelope").style.display="none";
  document.getElementById("letter").style.display="none";
  document.querySelector("h1").style.display="none";
  document.querySelector("p").style.display="none";

  const calendar=document.getElementById("calendar");
  calendar.style.display="block";

  calendar.innerHTML=`

    <p style="opacity:0.8; font-size:14px; margin-top:-10px;">

    <div class="date" onclick="abrirMemoria('2025-12-23')">23 de dezembro de 2025</div>
    <div class="date" onclick="abrirMemoria('2025-12-31')">31 de dezembro de 2025</div>

    <div class="date" onclick="abrirMemoria('2026-04-01')">1 de abril de 2026</div>
    <div class="date" onclick="abrirMemoria('2026-04-02')">2 de abril de 2026</div>
    <div class="date" onclick="abrirMemoria('2026-04-03')">3 de abril de 2026</div>
    <div class="date" onclick="abrirMemoria('2026-04-04')">4 de abril de 2026</div>

    <button class="time-button" onclick="voltarCarta()">⬅️ Voltar para a carta</button>
  `;
}

function abrirMemoria(data){

  const memory=document.getElementById("memory");
  memory.style.display="block";

  const h={

    "2023-06-28":`<h3>28 de junho de 2023</h3><p>Lembro como se fosse ontem. Foi o dia mais triste que eu tive esse ano. Eu estava lutando contra um relacionamento e uma rejeição, e agora estava tendo que lidar com a ida de uma amiga. Ela estava partindo da minha cidade para acompanhar a tia e ir morar em Fortaleza. Ela estava tão triste. Eu tirei fotos com ela antes dela ir embora, embora fossem fotos zoadas e etc. A gente estava começando a conversar. Eu não consegui chorar quando deu a hora de ir embora da escola. Eu só chorei quando cheguei em casa e percebi que ficaria sem abraços matinais e diários dela. Eu caí na realidade de que ela não iria voltar das férias e correria para abraçar meus amigos e a mim. Ela foi embora dia 30, mas deixou saudades dia 28. Ela era a melhor companhia e também a melhor pessoa e amiga do mundo.</p>`,

    "2023-11-20":`<h3>20 de novembro de 2023</h3><p>Após 5 meses conversando com você, jogando com você, eu tive uma conversa íntima sobre sentimentos. Acho que se não fosse por você, o que estava por vir no dia seguinte nunca teria acontecido... Você se abriu e contou sobre seus sentimentos, e então, puff... lá estava você dizendo que gostava de mim. Eu fiquei tão feliz porque meus sentimentos estavam sendo correspondidos. Eu já estava apaixonado por você desde o final de agosto. Eu dormi me sentindo realizado.</p>`,

    "2023-11-21":`
  <h3>21 de novembro de 2023</h3>
  <p>Talvez você queira ler mais sobre esse dia, quem sabe o que pode ta te esperando não é mesmo?!</p>

  <button class="btn-roxo" onclick="lerMais()">Ler mais</button>
`,

    "2024-02-21":`<h3>21 de fevereiro de 2024</h3><p>Você me enviou um áudio. Eu estava esperando há duas semanas pelo meu presente de “mêsversário” de relacionamento, você tinha dito que eu ia amar e quando eu abri eu fiquei feliz. Você tinha razão, eu amei. Porque justamente a garota que não conseguia falar “eu te amo” estava mandando uma declaração por áudio. Você me falava que me amava tanto. Sua voz era animada e feliz. Minhas bochechas doíam de tanto sorrir com aquele áudio. Eu ouvi tantas vezes que não consegui esquecer dele, mesmo tendo perdido ele no meu celular antigo.</p>`,

    "2024-07-16":`<h3>16 de julho de 2024</h3><p>O nosso reencontro. Eu acho que quase cheguei a morrer nesse dia, não por morte de acidente, mas de infarto mesmo. Eram tantas emoções naquele momento. Quando eu estava chegando, eu te vi de longe no portão me esperando. Você estava de shorts e uma regata bege, tão linda e fofa com aquela franja. Eu me sentei lá fora e conversamos pouco. A gente estava envergonhado demais pra conversar sem parar. Até que você me ofereceu água e eu aceitei. Você colocou seu celular pra carregar e trouxe a água. A gente ficou conversando e sua vó ficou só olhando. Você chamou pra comer bolo e tomar café e eu fui. Assim que terminei de comer e tomar, você me levou pra sentar no sofá. Eu mandei mensagem pra você e disse que você estava muito linda. Você agradeceu e ficou envergonhada. Sua vó levantou e foi tomar banho. A gente ficou um tempo só olhando pro nada e eu então coloquei a mão na sua coxa e você respondeu com a voz nervosa e falha: “E essa mãozinha nervosa aí?” Bastou isso para a gente começar a se beijar. Não eram beijos de língua, eram só selinhos, mas eu estava explodindo por dentro. Era o coração acelerado, borboletas no estômago e a mente a mil. A gente ficou assim por uns 5 a 10 minutos, até que uns garotos que estavam lá fora brincando de pega-pega fizeram barulho e a gente se afastou. Depois disso eu fui beber água e, quando a sua vó voltou, você me levou pro quarto. A gente ficou lá sem fazer nada, conversando às vezes, mas raramente. Eu fui e te mandei mensagem dizendo que queria te beijar de novo, e então a gente começou a se beijar naquele momento. Era um selinho tão desengonçado, era eu tentando dar um beijo de língua em você e você desviando, escondendo a língua. Eu nunca tinha beijado ninguém na minha vida. Você me dava sensações boas, até mordendo meus lábios, eu me sentia nas nuvens. Nós éramos igual casais de novelas que não podiam ficar sozinhos que já se pegavam intensamente. A gente ficou nisso uns 15 minutos até que o clima esquentou e a gente ficou muito lá nos amassos em alerta. Eu escutei tua tia chegando perto, então eu me afastei e fiquei fingindo que estava mexendo no celular. Quando sua tia saiu, eu tirei uma foto com você. Eu tenho essa foto até hoje no meu outro celular. A nossa relação ficou mais intensa depois desse dia.</p>`,

    "2025-10-09":`<h3>9 de outubro de 2025</h3><p>Foi a primeira vez que eu dormi na sua casa e também a primeira vez que eu te vi servindo na missa. Eu nunca tinha ido a uma igreja católica. Eu me senti confortável lá. Se não fosse por você, eu nunca teria conhecido a fé católica. Você estava na vela/tocha. Eu confesso que 40% do tempo eu prestei mais atenção em você e 40% nos outros pra eu não fazer errado (mesmo assim eu fiz) e os outros 20% foi na missa em si. Mesmo eu lutando pra não cair no sono. Quando a gente voltou, eu pedi um beijo e você me deu. Eu tentei novamente te beijar de língua e você brigou comigo, mandou eu deixar minha língua guardada. Eu achei você tão fofa me dando esse sermão.</p>`,

    "2025-11-30":`<h3>30 de novembro de 2025</h3><p>Foi a primeira vez que a gente se conectou juntos. A gente saiu com o pretexto de que iríamos para o shopping, mas acabamos indo para um lugar mais reservado. Esse dia foi especial porque você estava deslumbrante. Eu senti que eu podia ser eu mesmo com você, mesmo tendo vergonha do meu corpo. Eu acho que esse dia serviu pra nos aproximar mais.</p>`,

    "2025-12-22":`<h3>22 de dezembro de 2025</h3><p>A primeira vez que você veio dormir na minha casa. Foi tão eufórico porque meu sobrinho estava aqui e eu não queria que ele dormisse com a gente. Eu queria dormir agarradinho com você. Até que minha mãe o chamou pra dormir com ela. Eu agradeci tanto a Deus por esse momento. Eu estava muito feliz por você estar ali comigo.</p>`,


    "2025-12-23":`<h3>23 de dezembro de 2025</h3><p>Dia da minha formatura. A gente ficou enrolando e enrolando pra se arrumar. Dois dias antes eu tinha colocado minhas roupas pra lavar junto com meu pano grosso de dormir. Acabou que minha calça ficou cheia de bolinhas de tecido do pano e eu não sabia até o momento em que eu fiquei com exatas 1 hora pra me arrumar. Quando fui me vestir, lá estava minha roupa, cheia de bolinhas. Eu fui retirando com tapas, mas não saía. Você até tentou me ajudar, mas eu falei pra você continuar se arrumando. Fiquei lá tirando sozinho. Quando você terminou, já tinha amenizado mais. Você estava tão deslumbrante que eu gostaria de voltar sempre para aquele momento. Foi o mais importante da minha vida, e você estava lá para celebrar comigo. A gente foi, ouviu discursos chatos e longos, fofocamos da vida de todos e então chegou o momento de receber meu certificado de conclusão. Chamaram os nomes e eu senti todos aqueles olhares pra gente, mas pela primeira vez eu me senti bem. Senti que era perfeito estar com você ao meu lado em um momento tão importante. Após a formatura a gente seguiu pra um lugar com nossos amigos. A gente fez um encontro de casais, fomos comer pizza e tentamos tomar sorvete, mas estava fechado por causa do horário. Enfim, a gente chegou na casa do Kauã e decidimos ficar por lá mesmo. Eu busquei as suas coisas na minha casa e a gente dormiu lá. Foi lindo esse dia, porque tudo deu certo como eu pensei.</p>`,

    "2025-12-31":`<h3>31 de dezembro de 2025</h3><p>A gente fez a contagem juntos, passou a virada do ano juntos. Foi um dos melhores momentos do ano pra mim. Eu estava tão feliz que, pela primeira vez, eu comemorei uma data tão especial ao seu lado. Um novo começo e um novo caminho... juntos.</p>`,

    "2026-01-07":`<h3>7 de janeiro de 2026</h3><p>Mesmo que tenha adiado por 1 dia a sua ida, infelizmente você teve que ir embora, mesmo que você não quisesse e soubesse que alguém em quem você confiava muito tivesse feito a cabeça da sua tia. Janeiro não tinha começado legal pra gente, apesar do mês anterior ter sido maravilhoso. Eu não gostei que você tivesse que ir embora. Eu chorei tanto quando você teve que partir. Me senti como em 2023, vendo você ir embora e não poder fazer nada.</p>`,

    "2026-04-01":`<h3>1 de abril de 2026</h3><p>Eu senti que as coisas entre a gente não estavam muito legais. Na verdade, tudo estava meio oscilando. A gente brigava às vezes, mas voltava ao normal. Só que no começo de abril a gente não brigou. Você só ficou calada. Eu estava me divertindo demais pra perceber que você, minha namorada, minha companheira, minha mulher, estava se sentindo mal, estava quieta. Meu orgulho era muito alto pra entender o que estava acontecendo.</p>`,

    "2026-04-02":`<h3>2 de abril de 2026</h3><p>Cheguei lá na sua casa, mas você parecia distante, triste. Seu olhar carregava tristeza e cansaço. Mas meu egoísmo me fez pensar que você estava brava comigo por alguma coisa que eu fiz de errado. Eu fiquei triste, mas deixei pra lá. Até porque você é minha namorada, eu te conheço. Você se calava às vezes, e eu pensava que quando não tivesse nada, as coisas iriam voltar ao normal no dia seguinte. Ao menos foi o que eu pensei. Antes de você ir dormir, você me deu vários selinhos. Eu deveria ter aproveitado e me levantado e te beijado mais, te abraçado forte e dito que te amava.</p>`,

    "2026-04-03":`<h3>3 de abril de 2026</h3><p>A gente foi no shopping, mas você não fez nem questão de pegar na minha mão quando a gente entrou. Na primeira vez eu não entendi o que tava acontecendo. Eu peguei na sua mão e corrigi a posição da minha mão como normalmente eu fazia, mas então você não segurou minha mão como segurava antes. Ela estava solta. Você não olhava pra mim e eu senti isso, senti isso no peito, mas não quis aceitar. A gente foi na loja de roupa e, se eu soubesse que a gente ia ficar tão afastado, eu não teria nem aceitado o cartão ou comprado bermudas novas. Eu teria apenas aproveitado o tempo junto com você. A gente desceu pra comprar um milkmoo, mas eu só lembrei da minha promessa quando a gente já tava na porta do shopping. Talvez o estopim pra você ficar brava comigo tenha sido isso, ter quebrado a promessa de que eu iria parar de beber. Você ficou extremamente calada depois disso. Falou pouco. E na hora de esperar o Uber pra voltar eu falei que queria um beijo, mas você fingiu que nem ouviu. Eu pensei que era porque estávamos em público, mas quando você saiu pra servir na igreja você não me deu beijo de despedida e também não me deu beijo de boa noite. Eu entendi que tinha alguma coisa errada e, como sempre, meu pensamento egoísta achou que fosse eu que tivesse feito alguma coisa. E talvez fosse mesmo. Porque como você tava me tratando com indiferença, conversando apenas com o Diogo, eu virei as costas pra você em momentos em que talvez você só quisesse um olhar meu. Eu percebi também que você apagou o life360 também nesse dia.</p>`,

function lerMais(){

  document.getElementById("calendar").style.display = "none";
  document.getElementById("memory").style.display = "none";

  const novaCarta = document.createElement("div");
  novaCarta.id = "cartaSecreta";

  novaCarta.style.width = "80%";
  novaCarta.style.maxWidth = "520px";
  novaCarta.style.margin = "40px auto";
  novaCarta.style.background = "white";
  novaCarta.style.color = "black";
  novaCarta.style.padding = "20px";
  novaCarta.style.borderRadius = "10px";
  novaCarta.style.textAlign = "left";
  novaCarta.style.animation = "aparecer 0.6s ease";

  novaCarta.innerHTML = `
    <h2>💌 Nosso Começo</h2>

    <p>
      Foi a data em que tudo “começou”. Eu já sabia que você gostava de mim e eu não tinha nada a perder.
      Entrei no WhatsApp, mandei uma declaração em um texto e em seguida uma enquete.
    </p>

    <hr>

    <h3>Quer namorar comigo?</h3>

    <button class="btn-roxo" onclick="responder('sim')">Sim</button>
    <button class="btn-roxo" onclick="responder('nao')">Não</button>
    <button class="btn-roxo" onclick="responder('talvez')">Talvez</button>
    <button class="btn-roxo" onclick="responder('amizade')">Amizade colorida?</button>

    <div id="respostaEnquete" style="margin-top:15px;"></div>

    <p>
      Mandei isso entre 8:50 e 9:00. Eu lembro disso porque foi em um intervalo da escola. Eu estava tão nervoso que meu estômago estava dando voltas, aquelas famosas borboletas. Minutos depois você aceitou. Eu fiquei tão feliz que cheguei a chorar. Eu não estava acreditando que estava tudo dando certo pra mim. Eu estava tão feliz. Eu me senti o garoto mais feliz do mundo.
    </p>

    <button class="time-button" onclick="voltarCalendario()">Voltar</button>
  `;

  document.body.appendChild(novaCarta);
}

function responder(opcao){
  const box = document.getElementById("respostaEnquete");

  if(opcao === "sim"){
    box.innerHTML = "💖 foi exatamente o que você falou naquele dia!";
  }

  if(opcao === "nao"){
    box.innerHTML = "😅 Oh.. acho que você está um pouco atrasada pra dizer isso, haha!";
  }

  if(opcao === "talvez"){
    box.innerHTML = "🤔 Hmmmm, talvez eu te ligue então!";
  }

  if(opcao === "amizade"){
    box.innerHTML = "😶 Não foi uma boa escolha, até porque não gosto de dividir você com ninguém!";
  }
}

function voltarCalendario(){

  const carta = document.getElementById("cartaSecreta");
  if(carta) carta.remove();

  document.getElementById("calendar").style.display = "block";
}

function voltarCarta(){

  // tira o modo temporal (cor de fundo)
  document.body.classList.remove("temporal");

  // mostra elementos iniciais
  document.getElementById("envelope").style.display = "block";
  document.getElementById("letter").style.display = "block";
  document.querySelector("h1").style.display = "block";
  document.querySelector("p").style.display = "block";

  // esconde linha do tempo e memória
  document.getElementById("calendar").style.display = "none";
  document.getElementById("memory").style.display = "none";

}
